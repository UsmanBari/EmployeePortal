<section class="page-card">
	<div class="page-header">
		<div>
			<p class="section-kicker">Overview</p>
			<h2>Employee List</h2>
		</div>
		<p class="section-note">Mock data for the dashboard view</p>
	</div>

	<div class="table-wrap">
		<table>
			<thead>
				<tr>
					<th>ID</th>
					<th>Name</th>
					<th>Title</th>
					<th>Department</th>
					<th>Status</th>
				</tr>
			</thead>
			<tbody>
				@for (employee of employees; track employee.id) {
					<tr>
						<td>{{ employee.id }}</td>
						<td>{{ employee.name }}</td>
						<td>{{ employee.title }}</td>
						<td>{{ employee.department }}</td>
						<td><span class="status" [class.leave]="employee.status !== 'Active'">{{ employee.status }}</span></td>
					</tr>
				}
			</tbody>
		</table>
	</div>
</section>
